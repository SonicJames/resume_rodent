<!doctype html>
<meta charset="utf-8" />
<meta name="color-scheme" content="dark" />
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: #2d2d4e;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --body: #cbd5e1;
    --loc-bg: #0f3460;
    --loc-fg: #93c5fd;
    --sal-bg: #14532d;
    --sal-fg: #86efac;
    --accent: #4f46e5;
    --accent-text: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
  body { padding: 12px 14px; }
  h1 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text); }

  /* Job board */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo { width: 36px; height: 36px; border-radius: 5px; object-fit: contain; background: #fff; padding: 2px; flex-shrink: 0; }
  .logo-init { width: 36px; height: 36px; border-radius: 5px; background: var(--border); color: var(--sub); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .title { font-weight: 700; font-size: 14px; color: var(--text); line-height: 1.3; }
  .company { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { border-radius: 20px; padding: 2px 9px; font-size: 11px; }
  .badge-loc { background: var(--loc-bg); color: var(--loc-fg); }
  .badge-sal { background: var(--sal-bg); color: var(--sal-fg); }
  .summary { color: var(--body); font-size: 13px; line-height: 1.55; margin-bottom: 8px; }
  .full-desc { color: var(--sub); font-size: 12px; line-height: 1.65; border-top: 1px solid var(--border); padding-top: 8px; margin-bottom: 8px; display: none; white-space: pre-line; }
  .full-desc.open { display: block; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .btn-toggle { background: transparent; border: 1px solid var(--accent); color: var(--accent-text); border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  .btn-apply { background: var(--accent); color: #fff; border-radius: 5px; padding: 4px 12px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }

  /* Apply view */
  .back-bar { margin-bottom: 12px; }
  .btn-back { background: transparent; border: 1px solid var(--border); color: var(--sub); border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  .apply-header { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .apply-job-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .apply-job-meta { font-size: 12px; color: var(--sub); }
  .section-label { font-size: 12px; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  textarea { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px; font-size: 13px; line-height: 1.5; resize: vertical; min-height: 150px; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; display: block; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { color: var(--sub); font-size: 12px; margin-top: 8px; min-height: 18px; }
  .result-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-top: 12px; }
  .result-text { color: var(--body); font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
  .msg { border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
  .msg-user { background: var(--accent); color: #fff; margin-left: 24px; }
  .msg-assistant { background: var(--card); border: 1px solid var(--border); color: var(--body); margin-right: 24px; }
  .chat-input-row { display: flex; gap: 6px; margin-top: 10px; }
  .chat-input-row input { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
  .chat-input-row input:focus { outline: none; border-color: var(--accent); }
  .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-send:disabled { opacity: 0.5; }
  .upload-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .btn-upload { background: transparent; border: 1px solid var(--border); color: var(--sub); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .btn-upload:hover { border-color: var(--accent); color: var(--accent-text); }
  .upload-hint { color: var(--sub); font-size: 11px; }
  .apply-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); text-align: center; }
  .ext-link { color: var(--accent-text); font-size: 12px; cursor: pointer; }
  .ext-link:hover { text-decoration: underline; }
  .superseded { opacity: 0.4; pointer-events: none; }
</style>

<h1 id="heading">🐭 Resume Rodent</h1>
<div id="board-view"><div id="board"></div></div>
<div id="apply-view" style="display:none">
  <div class="back-bar"><button class="btn-back" id="back-btn">← Back to jobs</button></div>
  <div id="apply-content"></div>
</div>

<script type="module">
/*__EXT_APPS_BUNDLE__*/
const { App } = globalThis.ExtApps;

const seq = Date.now() + Math.random();
const bc = new BroadcastChannel("rr-job-board");
bc.addEventListener("message", (e) => {
  if (e.data?.seq > seq) document.body.classList.add("superseded");
});
bc.postMessage({ seq });

const app = new App({ name: "JobBoard", version: "1.0.0" }, {}, { autoResize: true });

app.onhostcontextchanged = (_ctx) => {
  // Always dark — don't let host theme override our palette
};

let currentJobs = [];
let currentApplyJob = null;
let chatConversation = [];
let resumeTextStored = "";

// ── Job board ─────────────────────────────────────────────────────

function renderJobs(jobs) {
  currentJobs = jobs;
  show("board-view");
  hide("apply-view");
  document.getElementById("heading").textContent =
    "🐭 Resume Rodent — " + jobs.length + " job" + (jobs.length !== 1 ? "s" : "") + " found";

  const board = document.getElementById("board");
  board.innerHTML = "";
  jobs.forEach((job, i) => {
    const card = document.createElement("div");
    card.className = "card";

    const logoHtml = job.logo
      ? `<img class="logo" src="${esc(job.logo)}" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(initEl('${esc(job.company)}')">`
      : initEl(job.company).outerHTML;
    const salBadge = job.salary ? `<span class="badge badge-sal">💰 ${esc(job.salary)}</span>` : "";
    const hasMore = job.fullDescription && job.fullDescription !== job.summary;

    card.innerHTML =
      `<div class="card-header">${logoHtml}<div>` +
      `<div class="title">[${i + 1}] ${esc(job.title)}</div>` +
      `<div class="company">${esc(job.company)}</div></div></div>` +
      `<div class="badges"><span class="badge badge-loc">📍 ${esc(job.location)}</span>${salBadge}</div>` +
      `<p class="summary">${esc(job.summary)}${hasMore ? "…" : ""}</p>` +
      (hasMore ? `<p class="full-desc">${esc(job.fullDescription)}</p>` : "") +
      `<div class="actions">` +
      (hasMore ? `<button class="btn-toggle">Show full description ▼</button>` : "") +
      `<button class="btn-apply">🎯 Help Me Apply</button></div>`;

    if (hasMore) {
      card.querySelector(".btn-toggle").addEventListener("click", function () {
        const desc = card.querySelector(".full-desc");
        const open = desc.classList.toggle("open");
        this.textContent = open ? "Hide description ▲" : "Show full description ▼";
      });
    }
    card.querySelector(".btn-apply").addEventListener("click", () => openApplyView(job));
    board.appendChild(card);
  });
}

// ── Apply view ────────────────────────────────────────────────────

function openApplyView(job) {
  currentApplyJob = job;
  chatConversation = [];
  resumeTextStored = "";

  hide("board-view");
  show("apply-view");
  document.getElementById("heading").textContent = "🐭 Resume Rodent — Apply";

  document.getElementById("apply-content").innerHTML =
    `<div class="apply-header">` +
    `<div class="apply-job-title">${esc(job.title)}</div>` +
    `<div class="apply-job-meta">${esc(job.company)}${job.location ? " · " + esc(job.location) : ""}${job.salary ? " · " + esc(job.salary) : ""}</div>` +
    `</div>` +
    `<div class="section-label">Your resume</div>` +
    `<div class="upload-row">` +
    `<label class="btn-upload" for="resume-file">📎 Upload file</label>` +
    `<input type="file" id="resume-file" accept=".txt,.pdf,.docx" style="display:none">` +
    `<span class="upload-hint" id="upload-hint">.txt · .pdf · .docx — or paste below</span>` +
    `</div>` +
    `<textarea id="resume-text" placeholder="Paste your resume text here…"></textarea>` +
    `<button class="btn-primary" id="analyze-btn">🔍 Analyze My Resume</button>` +
    `<div class="status" id="status"></div>` +
    `<div id="result-area"></div>` +
    `<div class="apply-footer">` +
    `<span class="ext-link" id="open-app-link">Open full Resume Rodent app for PDF export →</span>` +
    `</div>`;

  document.getElementById("analyze-btn").addEventListener("click", analyzeResume);
  document.getElementById("open-app-link").addEventListener("click", () => app.openLink({ url: job.applyUrl }));
  document.getElementById("resume-file").addEventListener("change", handleFileUpload);
}

document.getElementById("back-btn").addEventListener("click", () => renderJobs(currentJobs));

// ── File upload ───────────────────────────────────────────────────

async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const hint = document.getElementById("upload-hint");
  hint.textContent = "Reading " + file.name + "…";
  setStatus("Extracting text from file…");

  try {
    const buffer = await file.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    let binary = "";
    const chunk = 8192;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
    }
    const fileBase64 = btoa(binary);

    const result = await app.callServerTool({
      name: "extract_resume_text",
      arguments: { fileBase64, fileName: file.name },
    });

    const text = result.content?.[0]?.text || "";
    if (result.isError) throw new Error(text);

    document.getElementById("resume-text").value = text;
    hint.textContent = file.name + " loaded";
    setStatus("");
  } catch (err) {
    hint.textContent = ".txt · .pdf · .docx — or paste below";
    setStatus("Upload error: " + err.message);
  }

  e.target.value = "";
}

// ── Analysis via callServerTool → Railway → Vercel API ───────────

async function analyzeResume() {
  const resumeText = (document.getElementById("resume-text").value || "").trim();
  if (!resumeText) { setStatus("Please paste your resume text first."); return; }

  const btn = document.getElementById("analyze-btn");
  btn.disabled = true;
  btn.textContent = "Analyzing…";
  setStatus("Sending to Claude…");

  resumeTextStored = resumeText;
  const job = currentApplyJob;

  try {
    const result = await app.callServerTool({
      name: "analyze_resume",
      arguments: {
        jobTitle: job.title,
        jobDescription: job.fullDescription,
        jobUrl: job.url,
        resumeText,
      },
    });

    const text = result.content?.[0]?.text || "Analysis complete.";
    if (result.isError) throw new Error(text);

    chatConversation = [
      { role: "user", content: "Job: " + job.title + " at " + job.company + "\n\nResume:\n" + resumeText },
      { role: "assistant", content: text },
    ];
    showAnalysis(text);
    setStatus("");
  } catch (err) {
    setStatus("Error: " + err.message);
  }

  btn.disabled = false;
  btn.textContent = "🔍 Re-analyze";
}

function showAnalysis(text) {
  document.getElementById("result-area").innerHTML =
    `<div class="result-box"><div class="result-text">${escHtml(text)}</div></div>` +
    `<div id="chat-msgs"></div>` +
    `<div class="chat-input-row">` +
    `<input id="chat-input" placeholder="Ask a follow-up question…">` +
    `<button class="btn-send" id="send-btn">Send</button>` +
    `</div>`;

  const send = () => sendChat();
  document.getElementById("send-btn").addEventListener("click", send);
  document.getElementById("chat-input").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const text = (input.value || "").trim();
  if (!text) return;

  const sendBtn = document.getElementById("send-btn");
  input.value = "";
  sendBtn.disabled = true;
  chatConversation.push({ role: "user", content: text });
  appendMsg("user", text);

  try {
    const result = await app.callServerTool({
      name: "chat_on_resume",
      arguments: {
        jobDescription: "Job: " + currentApplyJob.title + " at " + currentApplyJob.company + "\n\n" + currentApplyJob.fullDescription,
        jobUrl: currentApplyJob.url,
        resumeText: resumeTextStored,
        conversation: chatConversation,
      },
    });
    const reply = result.content?.[0]?.text || "";
    chatConversation.push({ role: "assistant", content: reply });
    appendMsg("assistant", reply);
  } catch (err) {
    appendMsg("assistant", "Error: " + err.message);
  }

  sendBtn.disabled = false;
  input.focus();
}

function appendMsg(role, text) {
  const msgs = document.getElementById("chat-msgs");
  const div = document.createElement("div");
  div.className = "msg msg-" + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(msg) {
  const el = document.getElementById("status");
  if (el) el.textContent = msg;
}

// ── Tool result handler ───────────────────────────────────────────

app.ontoolresult = ({ content }) => {
  renderJobs(JSON.parse(content[0].text));
};

await app.connect();

// ── Helpers ───────────────────────────────────────────────────────

function show(id) { document.getElementById(id).style.display = ""; }
function hide(id) { document.getElementById(id).style.display = "none"; }
function esc(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function escHtml(s) { return esc(s).replace(/\n/g, "<br>"); }
function initEl(company) {
  const d = document.createElement("div");
  d.className = "logo-init";
  d.textContent = (company || "?")[0].toUpperCase();
  return d;
}
</script>
